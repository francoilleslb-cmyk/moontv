name: Build MoonTV Android TV APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'moontv-tv/**'
      - '.github/workflows/build-moontv-tv-apk.yml'
  pull_request:
    paths:
      - 'moontv-tv/**'
      - '.github/workflows/build-moontv-tv-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moontv-tv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moontv-tv-debug-apk
          path: moontv-tv/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
