name: Build MoonTV Android TV APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'moontv-tv/**'
      - '.github/workflows/build-moontv-tv-apk.yml'
  pull_request:
    paths:
      - 'moontv-tv/**'
      - '.github/workflows/build-moontv-tv-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Build debug APK
        working-directory: moontv-tv
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moontv-tv-debug-apk
          path: moontv-tv/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
